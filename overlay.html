<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    margin:0;
    padding:20px;
}

#board{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    font-size:60px;
    font-weight:bold;
}

#minute{
    text-align:center;
    margin-top:20px;
    font-size:30px;
    color:yellow;
}

</style>
</head>

<body>

<div id="board">

<div id="home">Loading...</div>

<div id="score">0 - 0</div>

<div id="away">Loading...</div>

</div>

<div id="minute">0'</div>

<script>

const api =
"https://script.google.com/macros/s/AKfycbyLDs1NNAOLTtNh68pIcV7KKXoKMOrEPdf3nhxykr5UQkDPsphCevRdq90QODz-JdNwUQ/exec";

async function updateScore(){

try{

const response = await fetch(api);

const data = await response.json();

console.log(data);

document.getElementById("home").innerText =
data.homeTeam;

document.getElementById("away").innerText =
data.awayTeam;

document.getElementById("score").innerText =
data.homeScore + " - " + data.awayScore;

document.getElementById("minute").innerText =
data.minute + "'";

}
catch(err){

console.log(err);

}

}

updateScore();

setInterval(updateScore,5000);

</script>

</body>
</html>
