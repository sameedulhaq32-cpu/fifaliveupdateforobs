<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>FIFA Live Overlay</title>

<style>

body{
    background:#111;
    color:#fff;
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;
}

#container{
    max-width:1200px;
    margin:auto;
}

#scoreboard{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    font-size:60px;
    font-weight:bold;
}

#minute{
    text-align:center;
    color:yellow;
    font-size:32px;
    margin-top:15px;
    margin-bottom:30px;
}

#eventsPanel{
    border:1px solid #444;
    border-radius:10px;
    padding:20px;
    background:#1a1a1a;
}

#eventsPanel h2{
    margin-top:0;
    color:#ffd700;
}

.event{
    padding:10px 0;
    border-bottom:1px solid #333;
    font-size:22px;
}

.event:last-child{
    border-bottom:none;
}

.loading{
    color:#999;
}

</style>

</head>

<body>

<div id="container">

```
<div id="scoreboard">

    <div id="home">Loading...</div>

    <div id="score">0 - 0</div>

    <div id="away">Loading...</div>

</div>

<div id="minute">0'</div>

<div id="eventsPanel">

    <h2>Live Events</h2>

    <div id="eventList" class="loading">
        Waiting for events...
    </div>

</div>
```

</div>

<script>

const api =
"https://script.google.com/macros/s/AKfycbyLDs1NNAOLTtNh68pIcV7KKXoKMOrEPdf3nhxykr5UQkDPsphCevRdq90QODz-JdNwUQ/exec";

async function loadData(){

    try{

        const response = await fetch(api);
        const data = await response.json();

        document.getElementById("home").innerText =
            data.scoreboard.homeTeam;

        document.getElementById("away").innerText =
            data.scoreboard.awayTeam;

        document.getElementById("score").innerText =
            data.scoreboard.homeScore +
            " - " +
            data.scoreboard.awayScore;

        document.getElementById("minute").innerText =
            data.scoreboard.minute + "'";

        let html = "";

        if(data.events && data.events.length > 0){

            for(let i = 0; i < data.events.length; i++){

                html +=
                "<div class='event'>" +
                "<strong>" +
                data.events[i][0] +
                "'</strong> - " +
                data.events[i][1] +
                "</div>";

            }

        }else{

            html =
            "<div class='event'>No events available</div>";

        }

        document.getElementById("eventList").innerHTML =
            html;

    }
    catch(error){

        console.log(error);

        document.getElementById("eventList").innerHTML =
            "<div class='event'>Failed to load data</div>";

    }

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
