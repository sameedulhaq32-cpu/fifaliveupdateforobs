<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug</title>
</head>
<body>

<h1>API Test</h1>

<pre id="output">Loading...</pre>

<script>

const api =
"https://script.google.com/macros/s/AKfycbx2r3-vOT27XKSLOM7JAEJ05fc2YgpTsO5MFqgu0CZluR0a_dkrHxp7VtK5aGlBc2bQdw/exec";

fetch(api)
.then(response => response.json())
.then(data => {

    console.log(data);

    document.getElementById("output").textContent =
        JSON.stringify(data,null,2);

})
.catch(error => {

    console.error(error);

    document.getElementById("output").textContent =
        error;

});

</script>

</body>
</html>
