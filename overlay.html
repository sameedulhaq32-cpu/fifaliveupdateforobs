<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FIFA Live Broadcast Overlay</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

/* SCOREBOARD */

#topBar{

    width:100%;
    height:100px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;

    border-bottom:2px solid #222;

    background:#0b0b0b;

}

.team{
    font-size:52px;
    font-weight:bold;
}

.score{
    font-size:72px;
    font-weight:bold;
    color:#ffffff;
}

#minute{

    font-size:34px;
    color:#ffd700;

    margin-left:30px;

}

/* MAIN AREA */

#main{

    height:calc(100vh - 150px);

    display:grid;

    grid-template-columns:45% 55%;

    grid-template-rows:50% 50%;

    gap:15px;

    padding:15px;

}

/* PANELS */

.panel{

    background:#111;

    border:1px solid #2a2a2a;

    border-radius:10px;

    overflow:hidden;

}

.panelTitle{

    background:#171717;

    color:#ffd700;

    padding:15px;

    font-size:30px;

    font-weight:bold;

}

.panelBody{

    height:calc(100% - 65px);

    overflow-y:auto;

    padding:15px;

}

/* EVENTS */

.event{

    padding:12px;

    border-bottom:1px solid #222;

    font-size:24px;

}

/* STANDINGS */

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:#202020;

    color:#ffd700;

    padding:12px;

    font-size:20px;

}

td{

    padding:12px;

    text-align:center;

    border-bottom:1px solid #222;

    font-size:20px;

}

/* FIXTURES */

.fixture{

    padding:15px;

    border-bottom:1px solid #222;

    font-size:22px;

}

/* TICKER */

#ticker{

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    height:50px;

    background:#111;

    border-top:2px solid #ffd700;

    overflow:hidden;

}

#tickerText{

    position:absolute;

    white-space:nowrap;

    line-height:50px;

    font-size:24px;

    animation:tickerMove 25s linear infinite;

}

@keyframes tickerMove{

    from{
        transform:translateX(100%);
    }

    to{
        transform:translateX(-100%);
    }

}

</style>
</head>

<body>

<div id="topBar">

    <div id="homeTeam" class="team">HOME</div>

    <div id="score" class="score">0 - 0</div>

    <div id="awayTeam" class="team">AWAY</div>

    <div id="minute">0'</div>

</div>

<div id="main">

    <!-- EVENTS -->

    <div class="panel">

        <div class="panelTitle">
            Live Events
        </div>

        <div class="panelBody" id="events">

            Loading...

        </div>

    </div>

    <!-- STANDINGS -->

    <div class="panel">

        <div class="panelTitle">
            Group Standings
        </div>

        <div class="panelBody">

            <table id="standingsTable"></table>

        </div>

    </div>

    <!-- FIXTURES -->

    <div class="panel">

        <div class="panelTitle">
            Upcoming Fixtures
        </div>

        <div class="panelBody" id="fixtures">

            Loading...

        </div>

    </div>

    <!-- TOURNAMENT INFO -->

    <div class="panel">

        <div class="panelTitle">
            Tournament Overview
        </div>

        <div class="panelBody">

            <div style="font-size:28px;line-height:2">

                <div>
                    Last Updated:
                    <span id="updatedTime">--</span>
                </div>

                <div>
                    Total Events:
                    <span id="eventCount">0</span>
                </div>

                <div>
                    Teams In Group:
                    <span id="teamCount">0</span>
                </div>

                <div>
                    Upcoming Matches:
                    <span id="fixtureCount">0</span>
                </div>

            </div>

        </div>

    </div>

</div>

<div id="ticker">

    <div id="tickerText">

        Loading...

    </div>

</div>

<script>

const api =
"PASTE_YOUR_LATEST_APPS_SCRIPT_URL_HERE";

function formatDate(dateString){

    try{

        const d = new Date(dateString);

        return d.toLocaleDateString(
            "en-GB",
            {
                day:"2-digit",
                month:"short",
                year:"numeric"
            }
        );

    }
    catch(err){

        return dateString;

    }

}

async function loadData(){

    try{

        const response =
        await fetch(api);

        const data =
        await response.json();

        /* SCOREBOARD */

        document.getElementById("homeTeam").innerText =
        data.scoreboard.homeTeam;

        document.getElementById("awayTeam").innerText =
        data.scoreboard.awayTeam;

        document.getElementById("score").innerText =
        data.scoreboard.homeScore +
        " - " +
        data.scoreboard.awayScore;

        document.getElementById("minute").innerText =
        data.scoreboard.minute + "'";

        /* EVENTS */

        let eventsHTML = "";

        for(let i=0;i<data.events.length;i++){

            eventsHTML +=

            "<div class='event'>" +

            "<strong>" +
            data.events[i][0] +
            "'</strong> - " +

            data.events[i][1] +

            "</div>";

        }

        document.getElementById("events").innerHTML =
        eventsHTML;

        /* STANDINGS */

        let standingsHTML =

        "<tr>" +
        "<th>Team</th>" +
        "<th>P</th>" +
        "<th>W</th>" +
        "<th>D</th>" +
        "<th>L</th>" +
        "<th>PTS</th>" +
        "</tr>";

        for(let s=0;s<data.standings.length;s++){

            standingsHTML += "<tr>";

            for(let c=0;c<data.standings[s].length;c++){

                standingsHTML +=
                "<td>" +
                data.standings[s][c] +
                "</td>";

            }

            standingsHTML += "</tr>";

        }

        document.getElementById("standingsTable").innerHTML =
        standingsHTML;

        /* FIXTURES */

        let fixturesHTML = "";

        for(let f=0;f<data.fixtures.length;f++){

            fixturesHTML +=

            "<div class='fixture'>" +

            formatDate(data.fixtures[f][0]) +

            " - " +

            data.fixtures[f][1] +

            "</div>";

        }

        document.getElementById("fixtures").innerHTML =
        fixturesHTML;

        /* TICKER */

        document.getElementById("tickerText").innerText =
        data.ticker.join("   •   ");

        /* OVERVIEW */

        document.getElementById("updatedTime").innerText =
        data.lastUpdated;

        document.getElementById("eventCount").innerText =
        data.events.length;

        document.getElementById("teamCount").innerText =
        data.standings.length;

        document.getElementById("fixtureCount").innerText =
        data.fixtures.length;

    }
    catch(error){

        console.log(error);

    }

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
