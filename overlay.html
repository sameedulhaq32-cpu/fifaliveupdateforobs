<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>FIFA Live Overlay</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* TOP SCOREBOARD */

#scoreboard{

    width:100%;
    height:120px;

    display:flex;
    justify-content:center;
    align-items:center;

    gap:50px;

    font-size:64px;
    font-weight:bold;

    border-bottom:2px solid #222;

}

#minute{

    text-align:center;

    font-size:34px;

    color:#ffd700;

    margin-top:10px;

}

/* MAIN GRID */

#main{

    display:grid;

    grid-template-columns:1fr 1fr;

    grid-template-rows:1fr 1fr;

    gap:20px;

    padding:20px;

    height:calc(100vh - 220px);

}

/* PANELS */

.panel{

    background:#111111;

    border:1px solid #2b2b2b;

    border-radius:12px;

    overflow:hidden;

}

.panel-title{

    background:#181818;

    color:#ffd700;

    font-size:28px;

    padding:15px;

    border-bottom:1px solid #2b2b2b;

}

.panel-content{

    padding:15px;

    overflow:auto;

    height:calc(100% - 60px);

}

/* EVENTS */

.event{

    padding:10px;

    border-bottom:1px solid #222;

    font-size:20px;

}

/* STANDINGS */

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:#222;

    color:#ffd700;

    padding:10px;

}

td{

    padding:10px;

    border-bottom:1px solid #222;

    text-align:center;

}

/* FIXTURES */

.fixture{

    padding:12px;

    border-bottom:1px solid #222;

    font-size:20px;

}

/* TICKER */

#ticker{

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    height:50px;

    background:#111;

    border-top:2px solid #ffd700;

    overflow:hidden;

}

#tickerText{

    position:absolute;

    white-space:nowrap;

    font-size:24px;

    line-height:50px;

    animation:ticker 25s linear infinite;

}

@keyframes ticker{

    from{
        transform:translateX(100%);
    }

    to{
        transform:translateX(-100%);
    }

}

</style>

</head>

<body>

<div id="scoreboard">

<div id="homeTeam">HOME</div>

<div id="score">0 - 0</div>

<div id="awayTeam">AWAY</div>

</div>

<div id="minute">0'</div>

<div id="main">

<div class="panel">

    <div class="panel-title">
        Live Events
    </div>

    <div class="panel-content" id="events">
        Loading...
    </div>

</div>

<div class="panel">

    <div class="panel-title">
        Group Standings
    </div>

    <div class="panel-content">

        <table id="standingsTable">

        </table>

    </div>

</div>

<div class="panel">

    <div class="panel-title">
        Upcoming Fixtures
    </div>

    <div class="panel-content" id="fixtures">

        Loading...

    </div>

</div>

<div class="panel">

    <div class="panel-title">
        Match Center
    </div>

    <div class="panel-content">

        <div style="font-size:24px;line-height:1.8;">

            <div id="summaryHome"></div>

            <div id="summaryScore"></div>

            <div id="summaryAway"></div>

            <div id="summaryMinute"></div>

        </div>

    </div>

</div>

</div>

<div id="ticker">

<div id="tickerText">
    Loading ticker...
</div>

</div>

<script>

const api =
"https://script.google.com/macros/s/AKfycbx2r3-vOT27XKSLOM7JAEJ05fc2YgpTsO5MFqgu0CZluR0a_dkrHxp7VtK5aGlBc2bQdw/exec";

async function loadData(){

    try{

        const response = await fetch(api);

        const data = await response.json();

        /* SCOREBOARD */

        document.getElementById("homeTeam").innerText =
        data.scoreboard.homeTeam;

        document.getElementById("awayTeam").innerText =
        data.scoreboard.awayTeam;

        document.getElementById("score").innerText =
        data.scoreboard.homeScore +
        " - " +
        data.scoreboard.awayScore;

        document.getElementById("minute").innerText =
        data.scoreboard.minute + "'";

        document.getElementById("summaryHome").innerText =
        "Home: " + data.scoreboard.homeTeam;

        document.getElementById("summaryAway").innerText =
        "Away: " + data.scoreboard.awayTeam;

        document.getElementById("summaryScore").innerText =
        "Score: " +
        data.scoreboard.homeScore +
        " - " +
        data.scoreboard.awayScore;

        document.getElementById("summaryMinute").innerText =
        "Minute: " +
        data.scoreboard.minute + "'";

        /* EVENTS */

        var eventsHTML = "";

        for(var i=0;i<data.events.length;i++){

            eventsHTML +=
            "<div class='event'>" +
            "<strong>" +
            data.events[i][0] +
            "'</strong> - " +
            data.events[i][1] +
            "</div>";

        }

        document.getElementById("events").innerHTML =
        eventsHTML;

        /* STANDINGS */

        var standingsHTML =
        "<tr>" +
        "<th>Team</th>" +
        "<th>P</th>" +
        "<th>W</th>" +
        "<th>D</th>" +
        "<th>L</th>" +
        "<th>PTS</th>" +
        "</tr>";

        for(var s=0;s<data.standings.length;s++){

            standingsHTML += "<tr>";

            for(var c=0;c<data.standings[s].length;c++){

                standingsHTML +=
                "<td>" +
                data.standings[s][c] +
                "</td>";

            }

            standingsHTML += "</tr>";

        }

        document.getElementById("standingsTable").innerHTML =
        standingsHTML;

        /* FIXTURES */

        var fixturesHTML = "";

        for(var f=0;f<data.fixtures.length;f++){

            fixturesHTML +=

            "<div class='fixture'>" +

            data.fixtures[f][0] +

            " - " +

            data.fixtures[f][1] +

            "</div>";

        }

        document.getElementById("fixtures").innerHTML =
        fixturesHTML;

        /* TICKER */

        document.getElementById("tickerText").innerText =
        data.ticker.join("   •   ");

    }

    catch(error){

        console.log(error);

    }

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
