<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Football Overlay</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;
}

#scoreboard{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    font-size:50px;
    font-weight:bold;
}

#minute{
    text-align:center;
    color:yellow;
    font-size:28px;
    margin-top:10px;
}

#events{
    margin-top:30px;
    border:1px solid #444;
    padding:20px;
    border-radius:10px;
}

.event{
    margin:8px 0;
    font-size:22px;
}

h2{
    margin-top:0;
}

</style>

</head>

<body>

<div id="scoreboard">

    <div id="home">Loading...</div>

    <div id="score">0 - 0</div>

    <div id="away">Loading...</div>

</div>

<div id="minute">0'</div>

<div id="events">

    <h2>Live Events</h2>

    <div id="eventList"></div>

</div>

<script>

// REPLACE THIS WITH YOUR APPS SCRIPT URL
const api = "https://script.google.com/macros/s/AKfycbx2r3-vOT27XKSLOM7JAEJ05fc2YgpTsO5MFqgu0CZluR0a_dkrHxp7VtK5aGlBc2bQdw/exec";

async function loadData() {

    try {

        const response = await fetch(api);
        const data = await response.json();

        document.getElementById("home").innerText =
            data.scoreboard.homeTeam;

        document.getElementById("away").innerText =
            data.scoreboard.awayTeam;

        document.getElementById("score").innerText =
            data.scoreboard.homeScore +
            " - " +
            data.scoreboard.awayScore;

        document.getElementById("minute").innerText =
            data.scoreboard.minute + "'";

        let eventsHtml = "";

        data.events.forEach(function(event){

            eventsHtml +=
                "<div class='event'>" +
                event[0] +
                "' - " +
                event[1] +
                "</div>";

        });

        document.getElementById("eventList").innerHTML =
            eventsHtml;

    }
    catch(error){

        console.log(error);

    }

}

loadData();

setInterval(loadData, 3000);

</script>

</body>
</html>
